<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="50%" style="stop-color:#fbfaf7"/>
      <stop offset="100%" style="stop-color:#fff8eb"/>
    </linearGradient>
    <radialGradient id="accentGradient" cx="85%" cy="15%" r="50%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="accentGradient2" cx="15%" cy="85%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#accentGradient)"/>
  <rect width="1200" height="630" fill="url(#accentGradient2)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="200" fill="#14b8a6" opacity="0.06"/>
  <circle cx="1050" cy="480" r="180" fill="#f59e0b" opacity="0.05"/>
  
  <!-- Logo container -->
  <g transform="translate(140, 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="140" height="140" rx="28" fill="#14b8a6"/>
    <rect x="0" y="4" width="140" height="140" rx="28" fill="#0d9488"/>
    <rect x="0" y="0" width="140" height="136" rx="28" fill="#14b8a6"/>
    <!-- Owl body -->
    <ellipse cx="70" cy="85" rx="45" ry="42" fill="#f0fdfa"/>
    <circle cx="70" cy="55" r="33" fill="#f0fdfa"/>
    <!-- Eyes -->
    <circle cx="52" cy="52" r="14" fill="#fff" stroke="#44403c" stroke-width="2.5"/>
    <circle cx="88" cy="52" r="14" fill="#fff" stroke="#44403c" stroke-width="2.5"/>
    <circle cx="55" cy="52" r="5.5" fill="#44403c"/>
    <circle cx="91" cy="52" r="5.5" fill="#44403c"/>
    <circle cx="57" cy="50" r="2" fill="#fff"/>
    <circle cx="93" cy="50" r="2" fill="#fff"/>
    <!-- Beak -->
    <path d="M63 62 L70 72 L77 62 Z" fill="#f59e0b" stroke="#d97706" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Graduation cap -->
    <path d="M35 38 L70 22 L105 38 L70 30 Z" fill="#0ea5e9"/>
    <rect x="66" y="18" width="8" height="10" fill="#0ea5e9"/>
    <circle cx="70" cy="16" r="4" fill="#f59e0b" stroke="#0ea5e9" stroke-width="1.5"/>
    <!-- Wings -->
    <ellipse cx="25" cy="85" rx="10" ry="24" fill="#0d9488" transform="rotate(15, 25, 85)"/>
    <ellipse cx="115" cy="85" rx="10" ry="24" fill="#0d9488" transform="rotate(-15, 115, 85)"/>
    <!-- Feet -->
    <ellipse cx="50" cy="128" rx="8" ry="5" fill="#f59e0b"/>
    <ellipse cx="90" cy="128" rx="8" ry="5" fill="#f59e0b"/>
    <!-- Book/chest -->
    <rect x="55" y="95" width="30" height="22" rx="6" fill="#fff"/>
    <text x="70" y="112" text-anchor="middle" font-size="14" fill="#14b8a6" font-family="system-ui, -apple-system, sans-serif" font-weight="bold">💊</text>
  </g>
  
  <!-- Brand text -->
  <text x="320" y="285" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#1c1917" letter-spacing="-0.02em">IlmoraX</text>
  
  <!-- Tagline -->
  <text x="320" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#57534e">Belajar Farmasi Jadi Seru!</text>
  
  <!-- Description -->
  <text x="140" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#78716c">Platform latihan UKAI terbaik untuk calon apoteker</text>
  
  <!-- Feature pills -->
  <g transform="translate(140, 480)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="#ccfbf1"/>
    <text x="70" y="26" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#0f766e">500+ Soal UKAI</text>
  </g>
  <g transform="translate(300, 480)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#fef3c7"/>
    <text x="60" y="26" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#92400e">Leaderboard</text>
  </g>
  <g transform="translate(440, 480)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#ccfbf1"/>
    <text x="60" y="26" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#0f766e">Materi Lengkap</text>
  </g>
</svg>
