<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Genius Pharmacist — Belajar Farmasi Jadi Seru!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/navigo/lib/navigo.min.js"></script>
<style>
:root{
  --primary:#0d9488; --primary-dark:#0f766e;
  --teal:#14b8a6; --teal-dark:#0d9488;
  --amber:#f59e0b; --amber-dark:#d97706;
  --coral:#f97316; --coral-dark:#ea580c;
  --violet:#8b5cf6; --violet-dark:#7c3aed;
  --rose:#f43f5e; --rose-dark:#e11d48;
  --slate:#334155;
  --bg:#f8fafc; --white:#fff;
  --gray-100:#f1f5f9; --gray-200:#e2e8f0; --gray-400:#94a3b8; --gray-700:#475569;
  --text:#1e293b;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:'Nunito',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--white);color:var(--text);-webkit-font-smoothing:antialiased}
button{font-family:inherit}
img{max-width:100%}
.view{animation:popin .25s ease}
@keyframes popin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:16px;font-weight:900;font-size:15px;letter-spacing:.4px;border:2px solid transparent;border-bottom-width:4px;cursor:pointer;transition:transform .06s,filter .15s;user-select:none;text-transform:uppercase}
.btn:active{transform:translateY(2px);border-bottom-width:2px}
.btn:disabled{opacity:.55;pointer-events:none}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);border-bottom-color:var(--primary-dark);box-shadow:0 4px 0 var(--primary-dark)}
.btn-blue{background:var(--teal);color:#fff;border-bottom-color:var(--teal-dark);box-shadow:0 4px 0 var(--teal-dark)}
.btn-red{background:var(--rose);color:#fff;border-bottom-color:var(--rose-dark);box-shadow:0 4px 0 var(--rose-dark)}
.btn-yellow{background:var(--amber);color:#4b4b4b;border-bottom-color:var(--amber-dark);box-shadow:0 4px 0 var(--amber-dark)}
.btn-white{background:#fff;color:var(--gray-700);border:2px solid var(--gray-200);border-bottom:4px solid var(--gray-200)}
.btn-lg{padding:17px 28px;font-size:17px;border-radius:18px}

/* LANDING */
.landing-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;max-width:1100px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:var(--primary)}
.hero{max-width:1100px;margin:0 auto;padding:36px 20px 20px;text-align:center}
.hero-owl{width:140px;height:140px;margin:0 auto 12px}
.hero h1{font-size:48px;line-height:1.02;font-weight:900;color:#3c3c3c;margin:8px 0 12px}
.hero p{font-size:18px;color:#777;max-width:560px;margin:0 auto 26px}
.hero-ctas{display:flex;flex-direction:column;gap:12px;max-width:360px;margin:0 auto}
.streak-demo{margin-top:28px;display:flex;justify-content:center}
.streak-card{display:flex;align-items:center;gap:12px;background:#fff;border:2px solid var(--gray-200);border-bottom:4px solid var(--gray-200);padding:14px 18px;border-radius:16px;box-shadow:var(--shadow)}
.streak-flame{font-size:28px}
.streak-card b{display:block;font-size:16px}
.streak-card span{font-size:13px;color:#777}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:640px;margin:38px auto 0;padding:0 20px}
.stat-card{background:var(--bg);border-radius:16px;padding:18px;text-align:center;border:2px solid var(--gray-100)}
.stat-card b{font-size:26px;display:block;color:var(--primary)}
.stat-card span{color:#777;font-weight:700}
.pricing{padding:56px 20px;background:var(--bg);margin-top:44px}
.pricing h2{text-align:center;font-size:32px;font-weight:900;margin:0 0 28px}
.tiers{display:grid;gap:18px;max-width:1000px;margin:0 auto;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.tier{background:#fff;border-radius:24px;border:2px solid var(--gray-200);border-bottom:6px solid var(--gray-200);overflow:hidden;text-align:center;padding-bottom:24px}
.tier.featured{border-color:var(--primary);border-bottom-color:var(--primary-dark);transform:translateY(-4px);box-shadow:0 14px 28px rgba(88,204,2,.15)}
.tier-head{padding:10px;color:#fff;font-weight:900;letter-spacing:1px}
.tier .price{font-size:38px;font-weight:900;margin:18px 0 6px}
.tier .price span{font-size:15px;color:#777;font-weight:800}
.tier ul{list-style:none;padding:0;margin:0 0 18px;color:#555}
.tier li{padding:6px}

/* APP SHELL */
.app-shell{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;padding-bottom:92px}
.top-bar{position:sticky;top:0;z-index:20;background:#fff;display:flex;justify-content:space-between;padding:10px 12px;border-bottom:2px solid var(--gray-200);gap:8px}
.tb-item{display:flex;align-items:center;gap:5px;font-weight:900;font-size:14px;padding:7px 10px;border-radius:12px;background:var(--bg);white-space:nowrap}
.tb-item.hearts{color:var(--rose);background:#ffefef}
.tb-item.streak{color:var(--coral);background:#fff4e5}
.tb-item.gems{color:var(--teal);background:#e9f7ff}
.tb-item.xp{color:#b58a00;background:#fff7d6}

/* MODULES */

.module-card{width:100%;display:flex;align-items:center;gap:14px;padding:14px;background:#fff;border:2px solid var(--gray-200);border-radius:16px;text-align:left;cursor:pointer;transition:.15s}
.module-card:active{transform:scale(.99);border-color:var(--primary)}
.mod-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.mod-main{flex:1;min-width:0}

/* PATH */
.path-container{padding:18px 16px 30px}
.unit-header{background:#fff;border:2px solid var(--gray-200);border-bottom:4px solid var(--gray-200);border-radius:16px;padding:14px 16px;font-weight:900;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.path{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;padding:16px 0 60px}
.path::before{content:"";position:absolute;top:30px;bottom:30px;width:8px;background:repeating-linear-gradient(#e5e5e5 0 22px, transparent 22px 44px);left:50%;transform:translateX(-50%);border-radius:4px;z-index:0}
.node-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;margin:14px 0;transition:transform .2s}
.node-wrap.offset-1{transform:translateX(70px)}
.node-wrap.offset--1{transform:translateX(-70px)}
.node-ring{position:relative;width:88px;height:88px}
.node-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.node-ring circle{fill:none;stroke-width:6}
.node-ring .bg{stroke:#e5e5e5}
.node-ring .pg{stroke:var(--primary);stroke-dasharray:251;stroke-dashoffset:calc(251 - 251 * var(--p,0));stroke-linecap:round;transition:.6s}
.node-btn{position:absolute;left:4px;top:4px;width:80px;height:80px;border-radius:50%;border:none;border-bottom:6px solid;font-size:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 14px rgba(0,0,0,.12);transition:.08s;background:#fff}
.node-btn:active{transform:translateY(3px);border-bottom-width:3px}
.node-btn.green{background:var(--primary);border-color:var(--primary-dark);color:#fff}
.node-btn.red{background:var(--rose);border-color:var(--rose-dark);color:#fff}
.node-btn.purple{background:var(--violet);border-color:var(--violet-dark);color:#fff}
.node-btn.blue{background:var(--teal);border-color:var(--teal-dark);color:#fff}
.node-btn.yellow{background:var(--amber);border-color:var(--amber-dark);color:#4b4b4b}
.node-btn.gray{background:#e5e5e5;border-color:#c9c9c9;filter:grayscale(.2)}
.node-label{margin-top:8px;font-weight:800;font-size:13px;background:#fff;padding:5px 10px;border-radius:10px;border:2px solid var(--gray-200);max-width:140px;text-align:center}
.tip-card{margin:18px 0;background:#fff;border:2px solid var(--gray-200);border-bottom:4px solid var(--gray-200);border-radius:16px;padding:14px;display:flex;gap:12px;align-items:center}
.tip-owl{font-size:34px;background:#e8facc;width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tip-card b{display:block;margin-bottom:2px}
.tip-card p{margin:0;font-size:14px;color:#777}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:2px solid var(--gray-200);display:flex;justify-content:space-around;padding:8px 0 10px;z-index:30}
.bottom-nav button{background:none;border:none;padding:8px 10px;border-radius:14px;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:800;font-size:11px;color:#a3a3a3;min-width:72px}
.bottom-nav button span:first-child{font-size:22px}
.bottom-nav button.active{color:var(--teal);background:#eef9ff}

/* TRYOUT */
.section-head{padding:18px 16px 6px}
.section-head h2{margin:0;font-size:24px;font-weight:900}
.section-head p{margin:4px 0 0;color:#777;font-weight:700}
.tryout-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:14px 16px}
.skill-btn{background:#fff;border:2px solid var(--gray-200);border-bottom:5px solid var(--gray-200);border-radius:22px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;position:relative;transition:.08s}
.skill-btn:active{transform:translateY(2px);border-bottom-width:3px}
.skill-btn.locked{opacity:.6}
.skill-icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;color:#fff;border-bottom:4px solid rgba(0,0,0,.18);box-shadow:inset 0 -4px 0 rgba(0,0,0,.08)}
.skill-title{font-weight:900;text-align:center;font-size:15px;line-height:1.15}
.skill-stars{font-size:14px;letter-spacing:1px}
.quota-badge{position:absolute;top:8px;right:8px;background:var(--coral);color:#fff;font-size:11px;font-weight:900;padding:4px 8px;border-radius:9px;border-bottom:2px solid #d87f00}

/* TEST */

.q-navigator{margin-top:24px;background:#fff;border:2px solid var(--gray-200);border-radius:16px;padding:14px}
.nav-title{font-weight:900;font-size:13px;color:var(--gray-700);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.nav-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
.nav-btn{aspect-ratio:1;border:2px solid var(--gray-200);background:#fff;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer;transition:.15s}
.nav-btn:hover{background:var(--gray-100)}
.nav-btn.current{background:var(--primary);color:#fff;border-color:var(--primary-dark)}
.nav-btn.answered{background:var(--teal);color:#fff;border-color:var(--teal-dark);opacity:.7}
.nav-btn.flagged{position:relative}
.nav-btn.flagged::after{content:"ð©";position:absolute;top:-4px;right:-4px;font-size:10px}

.test-view{background:#fff;min-height:100vh;display:flex;flex-direction:column}
.test-header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:2px solid var(--gray-200);position:sticky;top:0;background:#fff;z-index:10}
.icon-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--gray-200);background:#fff;font-size:18px;cursor:pointer;flex-shrink:0;font-weight:900;color:#777}
.progress{flex:1;height:14px;background:var(--gray-200);border-radius:7px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);width:0%;transition:width .3s}
.header-pills{display:flex;gap:6px}
.pill{padding:5px 10px;border-radius:12px;font-weight:900;font-size:13px;background:var(--bg)}
.pill.hearts{color:var(--rose);background:#ffefef}
.pill.timer{color:var(--teal);background:#e9f7ff}
.test-body{flex:1;padding:18px 14px 80px;max-width:640px;margin:0 auto;width:100%}
.q-card{background:#fff;border:2px solid var(--gray-200);border-bottom:4px solid var(--gray-200);border-radius:20px;padding:18px;margin-bottom:18px}
.q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-subject{background:var(--teal);color:#fff;font-size:12px;font-weight:900;padding:5px 10px;border-radius:8px;letter-spacing:.4px}
.flag-btn{background:none;border:2px solid var(--gray-200);width:38px;height:38px;border-radius:11px;font-size:18px;cursor:pointer;transition:.15s}
.flag-btn.active{background:#fff3d6;border-color:var(--coral);transform:scale(1.05)}
.q-text{font-size:22px;font-weight:900;line-height:1.28;margin:0}
.options{display:flex;flex-direction:column;gap:11px}
.option{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:15px 14px;background:#fff;border:2px solid var(--gray-200);border-bottom:4px solid var(--gray-200);border-radius:16px;font-size:17px;font-weight:800;cursor:pointer;transition:.08s}
.option:hover{background:#fafafa}
.option:active{transform:translateY(1px);border-bottom-width:3px}
.option.selected{border-color:var(--teal);background:#e9f7ff;border-bottom-color:var(--teal-dark)}
.option.correct{border-color:var(--primary);background:#e8facc;border-bottom-color:var(--primary-dark)}
.option.wrong{border-color:var(--rose);background:#ffecec;border-bottom-color:var(--rose-dark)}
.opt-letter{width:32px;height:32px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:900;color:#777;flex-shrink:0;border:2px solid #e0e0e0}
.option.selected .opt-letter{background:var(--teal);color:#fff;border-color:var(--teal-dark)}
.test-footer{position:sticky;bottom:0;background:#fff;padding:12px 14px;border-top:2px solid var(--gray-200);box-shadow:0 -4px 12px rgba(0,0,0,.04);z-index:5}
.btn-check{width:100%;max-width:640px;margin:0 auto;display:flex}
.feedback{position:fixed;left:0;right:0;bottom:0;transform:translateY(110%);transition:.32s cubic-bezier(.2,.8,.2,1);z-index:50;padding:0 12px 12px;max-width:640px;margin:0 auto}
.feedback.show{transform:translateY(0)}
.feedback-inner{border-radius:20px;padding:14px;border:2px solid;border-bottom:5px solid;display:flex;gap:12px;align-items:flex-start}
.feedback.correct .feedback-inner{background:#e8facc;border-color:var(--primary);border-bottom-color:var(--primary-dark)}
.feedback.wrong .feedback-inner{background:#ffecec;border-color:var(--rose);border-bottom-color:var(--rose-dark)}
.fb-icon{font-size:28px;line-height:1;margin-top:2px}
.fb-text{flex:1}
.fb-text b{display:block;font-size:18px;margin-bottom:3px}
.fb-text p{margin:0;font-size:14px;color:#555;line-height:1.35}
.feedback .btn{min-width:110px;flex-shrink:0}

/* RESULTS */
.results-view{background:linear-gradient(180deg,#e9f7ff 0%,#fff 38%);min-height:100vh;position:relative;overflow:hidden}
#confetti{position:absolute;inset:0;pointer-events:none}
.results-content{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:38px 20px;text-align:center}
.celebrate{font-size:64px;animation:bounce 1s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.results-content h1{font-size:32px;font-weight:900;margin:8px 0 22px}
.score-ring{position:relative;width:168px;height:168px;margin:0 auto 14px}
.score-ring svg{width:100%;height:100%}
.score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-text b{font-size:44px;font-weight:900;color:var(--primary);line-height:1}
.score-text span{font-size:12px;font-weight:900;color:#777;letter-spacing:1px}
.xp-gain{font-size:30px;font-weight:900;color:var(--amber-dark);margin-bottom:22px;animation:pop .6s cubic-bezier(.2,1.6,.4,1)}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.18)}100%{transform:scale(1)}}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px}
.r-stat{background:#fff;border:2px solid var(--gray-200);border-bottom:4px solid var(--gray-200);border-radius:16px;padding:13px 8px}
.r-stat span:first-child{font-size:24px;display:block}
.r-stat b{display:block;font-size:20px;margin:4px 0}
.r-stat span:last-child{font-size:12px;color:#777;font-weight:800}
.review{margin-top:22px;text-align:left}
.review details{background:#fff;border:2px solid var(--gray-200);border-radius:16px;padding:12px 15px}
.review summary{font-weight:900;cursor:pointer;list-style:none}
.review summary::-webkit-details-marker{display:none}

function startTest(id){
  const qs = questionBank[id] || questionBank[1];
  state.test = {id:+id,qIndex:0,selected:null,flagged:[],questions:JSON.parse(JSON.stringify(qs)),answers:[]};
}
function testView(id){
  if(!state.test || state.test.id!=id) startTest(id);
  const t=state.test; const q=t.questions[t.qIndex]; const total=t.questions.length; const pct = Math.round((t.qIndex)/total*100);
  return `<div class="test-view">
    <div class="test-header">
      <button class="icon-btn" data-navigate="/tryout">â</button>
      <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="header-pills"><div class="pill">Soal ${t.qIndex+1}/${total}</div><div class="pill timer">01:48</div></div>
    </div>
    <div class="test-body">
      <div class="q-card">
        <div class="q-top"><span class="q-subject">${q.subject}</span><button class="flag-btn ${t.flagged.includes(t.qIndex)?'active':''}" id="flagBtn" title="Ragu-ragu">ð©</button></div>
        <h2 class="q-text">${q.question}</h2>
      </div>
      <div class="options">
        ${q.options.map((opt,i)=>{
          const classes=['option'];
          if(t.selected===i) classes.push('selected');
          return `<button class="${classes.join(' ')}" data-i="${i}"><span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span></button>`;
        }).join('')}
      </div>
      <div class="q-navigator">
        <div class="nav-title">Navigasi Soal</div>
        <div class="nav-grid">
          ${t.questions.map((_,i)=>{
            let cls='nav-btn';
            if(i===t.qIndex) cls+=' current';
            else if(t.answers[i]!==undefined) cls+=' answered';
            if(t.flagged.includes(i)) cls+=' flagged';
            return `<button class="${cls}" data-goto="${i}">${i+1}</button>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="test-footer"><button class="btn btn-primary btn-check" id="nextBtn">${t.qIndex===total-1?'SELESAI':'SELANJUTNYA'}</button></div>
  </div>`;
}

function attachTest(){
  const t=state.test; if(!t) return;
  document.querySelectorAll('.option').forEach(b=>{
    b.onclick=()=>{ t.selected=+b.dataset.i; t.answers[t.qIndex]=t.selected; render(testView(t.id)); attachTest(); };
  });
  document.getElementById('nextBtn')?.addEventListener('click',()=>{
    if(t.qIndex < t.questions.length-1){
      t.qIndex++; t.selected=t.answers[t.qIndex] ?? null;
      render(testView(t.id)); attachTest();
    }else{
      // submit
      let correct=0;
      const wrongs=[];
      t.questions.forEach((q,i)=>{
        const sel=t.answers[i];
        const ok=sel===q.correct;
        if(ok) correct++; else wrongs.push({...q,user:sel!==undefined?q.options[sel]:'Tidak dijawab'});
      });
      const score=Math.round(correct/t.questions.length*100);
      const xpEarn=50+correct*20; state.xp+=xpEarn; state.gems+=12; state.streak++;
      state.lastResults={score,correct,total:t.questions.length,xpEarn,wrongs};
      router.navigate('/results');
    }
  });
  document.getElementById('flagBtn')?.addEventListener('click',()=>{
    const i=t.qIndex; t.flagged = t.flagged.includes(i)? t.flagged.filter(x=>x!==i): [...t.flagged,i];
    render(testView(t.id)); attachTest();
  });
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.onclick=()=>{ t.qIndex=+b.dataset.goto; t.selected=t.answers[t.qIndex] ?? null; render(testView(t.id)); attachTest(); };
  });
}

function resultsView(){
  const r=state.lastResults||{score:80,correct:4,total:5,xpEarn:130,wrongs:[]};
  const dash = 339; const off = dash - dash * r.score/100;
  setTimeout(runConfetti,100);
  return `<div class="results-view"><canvas id="confetti"></canvas>
    <div class="results-content">
      <div class="celebrate">🎉</div>
      <h1>Pelajaran selesai!</h1>
      <div class="score-ring">
        <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="54" stroke="#e5e5e5" stroke-width="12" fill="none"/><circle cx="60" cy="60" r="54" stroke="#58cc02" stroke-width="12" fill="none" stroke-dasharray="${dash}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 60 60)"/></svg>
        <div class="score-text"><b>${r.score}%</b><span>AKURASI</span></div>
      </div>
      <div class="xp-gain">+${r.xpEarn} XP</div>
      <div class="result-stats">
        <div class="r-stat"><span>🎯</span><b>${r.correct}/${r.total}</b><span>Benar</span></div>
        <div class="r-stat"><span>⚡</span><b>1:42</b><span>Cepat</span></div>
        <div class="r-stat"><span>🔥</span><b>${state.streak}</b><span>Streak</span></div>
      </div>
      <button class="btn btn-primary btn-lg" data-navigate="/dashboard" style="width:100%">LANJUTKAN</button>
      <div class="review">
        <details ${r.wrongs.length?'open':''}>
          <summary>Lihat pembahasan (${r.wrongs.length} salah)</summary>
          <div class="review-list">
            ${r.wrongs.length? r.wrongs.map(w=>`<div class="review-item"><b>${w.question}</b><br><span style="color:#777">Jawabanmu: ${w.user}</span><br><span style="color:var(--primary);font-weight:800">Benar: ${w.options[w.correct]}</span></div>`).join('') : `<div class="review-item" style="border-left-color:var(--primary)">Sempurna! Tidak ada yang salah 🎉</div>`}
          </div>
        </details>
      </div>
    </div>
  </div>`;
}
function runConfetti(){
  const c=document.getElementById('confetti'); if(!c) return; const x=c.getContext('2d'); c.width=innerWidth; c.height=innerHeight;
  const p=Array.from({length:140},()=>({x:Math.random()*c.width,y:Math.random()*-c.height,r:Math.random()*5+3,co:`hsl(${Math.random()*360},90%,60%)`,s:Math.random()*2.5+1.5,a:Math.random()*Math.PI}));
  let f=0; (function anim(){ x.clearRect(0,0,c.width,c.height); p.forEach(o=>{o.y+=o.s;o.x+=Math.sin(f/20+o.a)*0.7; if(o.y>c.height) o.y=-10; x.fillStyle=o.co; x.beginPath(); x.arc(o.x,o.y,o.r,0,6.28); x.fill();}); f++; if(f<320) requestAnimationFrame(anim); })();
}

function badgesView(){
  const shop=[{id:'freeze',name:'Streak Freeze',icon:'❄️',cost:200,desc:'Amankan streak 1 hari'},{id:'heart',name:'Isi Hearts',icon:'❤️',cost:120,desc:'Penuhkan hearts'},{id:'boost',name:'XP Boost',icon:'⚡',cost:150,desc:'2x XP 30 menit'}];
  return `<div class="app-shell">
    ${TopBar()}
    <div class="section-head"><h2>Lencana & Toko</h2><p>Kumpulkan, pamerkan, belanja power-up</p></div>
    <div class="badge-tabs"><button class="active" id="tab1">Pencapaian</button><button id="tab2">Toko</button></div>
    <div id="badgePane">
      <div class="badge-grid">
        ${state.badges.map(b=>`<div class="badge-item ${b.unlocked?'':'locked'}"><div class="badge-ring" style="--p:${b.progress/b.total}"><svg viewBox="0 0 92 92"><circle cx="46" cy="46" r="40"/><circle class="p" cx="46" cy="46" r="40"/></svg><div class="badge-icon">${b.icon}</div></div><b>${b.name}</b><span>${b.progress}/${b.total}</span></div>`).join('')}
      </div>
    <div id="shopPane" style="display:none">
      <div class="shop-grid">
        ${shop.map(s=>`<div class="shop-item"><div class="shop-icon">${s.icon}</div><div class="shop-info"><b>${s.name}</b><span>${s.desc}</span></div><button class="buy-btn" data-cost="${s.cost}" data-id="${s.id}">💎 ${s.cost}</button></div>`).join('')}
      </div>
    </div>
    ${BottomNav('badge')}
  </div>`;
}
function attachBadges(){
  const t1=document.getElementById('tab1'), t2=document.getElementById('tab2'), p1=document.getElementById('badgePane'), p2=document.getElementById('shopPane');
  t1.onclick=()=>{t1.classList.add('active');t2.classList.remove('active');p1.style.display='';p2.style.display='none'};
  t2.onclick=()=>{t2.classList.add('active');t1.classList.remove('active');p2.style.display='';p1.style.display='none'};
  document.querySelectorAll('.buy-btn').forEach(b=>b.onclick=()=>{const c=+b.dataset.cost; if(state.gems>=c){state.gems-=c; if(b.dataset.id==='heart') state.hearts=5; alert('Berhasil dibeli!'); render(badgesView()); attachBadges();} else alert('Gems kurang!');});
}

function leaderboardView(){
  const users=[
    {r:1,n:"DewiPharma",xp:5420,a:"👩‍⚕️",ch:"up"},
    {r:2,n:"BudiApoteker",xp:5180,a:"👨‍⚕️",ch:"down"},
    {r:3,n:"RaniRx",xp:4960,a:"👩",ch:"up"},
    {r:4,n:"ApotekerMuda",xp:state.xp,a:"🦉",ch:"up",me:true},
    {r:5,n:"FarmaJoe",xp:4100,a:"🧑‍🔬",ch:"down"},
    {r:6,n:"SitiObat",xp:3890,a:"👩‍🎓",ch:"up"},
    {r:7,n:"AndiCare",xp:3650,a:"👨",ch:"down"},
  ];
  const top=users.slice(0,3);
  return `<div class="app-shell">
    ${TopBar()}
    <div class="section-head"><h2>Liga Perunggu</h2><p>Top 10 naik ke Perak minggu ini</p></div>
    <div class="league-tabs"><button class="active">🥉 Perunggu</button><button>🥈 Perak</button><button>🥇 Emas</button></div>
    <div class="podium">
      ${[1,0,2].map(i=>{const u=top[i]; const cls=i===0?'podium-1':i===1?'podium-2':'podium-3'; return `<div class="podium-place ${cls}"><div class="podium-avatar">${i===0?'<span class="crown">👑</span>':''}${u.a}</div><div class="podium-bar"><b>${u.n}</b><br><span style="font-size:12px;color:#777">${u.xp} XP</span></div></div>`}).join('')}
    </div>
    <div class="leader-list">
      ${users.map(u=>`<div class="leader-row ${u.me?'me':''}"><span class="rank">${u.r}</span><div class="avatar">${u.a}</div><div class="info"><b>${u.n}${u.me?' (Kamu)':''}</b><span>${u.xp} XP</span></div><div class="change ${u.ch}">${u.ch==='up'?'▲':'▼'}</div></div>`).join('')}
    </div>
    ${BottomNav('rank')}
  </div>`;
}

/* ROUTES */
router.on({
  '/': ()=>render(landingView()),
  '/dashboard': ()=>{ render(dashboardView()); attachDashboard(); },
  '/tryout': ()=>{ render(tryoutView()); attachTryout(); },
  '/test/:id': ({data})=>{ render(testView(data.id)); attachTest(); },
  '/results': ()=>{ render(resultsView()); },
  '/badges': ()=>{ render(badgesView()); attachBadges(); },
  '/leaderboard': ()=>render(leaderboardView()),
});
router.notFound(()=>router.navigate('/'));
router.resolve();
document.getElementById('dialogClose')?.addEventListener('click',()=>document.getElementById('premiumDialog').classList.remove('show'));
document.getElementById('dialogUpgrade')?.addEventListener('click',()=>{document.getElementById('premiumDialog').classList.remove('show'); alert('Redirect ke pembayaran...');});
document.getElementById('premiumDialog')?.addEventListener('click',e=>{if(e.target.id==='premiumDialog') e.target.classList.remove('show')});

/* PWA-like tap feedback */
document.addEventListener('touchstart',()=>{}, {passive:true});
</script>
